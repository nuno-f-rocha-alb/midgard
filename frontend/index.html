<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midgard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // aplica o accent guardado antes do React montar, para não haver flash de cor
      (function () {
        try {
          var c = localStorage.getItem('midgard:accent')
          var m = c && /^#?([0-9a-f]{6})$/i.exec(c.trim())
          if (m) {
            var n = parseInt(m[1], 16)
            document.documentElement.style.setProperty(
              '--accent-rgb',
              ((n >> 16) & 255) + ', ' + ((n >> 8) & 255) + ', ' + (n & 255),
            )
          }
        } catch (e) {}
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
