<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #1c1410;
        color: #ece6df;
        padding: 18px;
        min-width: 340px;
      }
      label { display: block; font-size: 13px; margin-bottom: 6px; color: #9a907f; }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #3a322a;
        background: #12100e;
        color: #ece6df;
        font-size: 14px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        padding: 8px 18px;
        border: none;
        border-radius: 8px;
        background: #ff8c42;
        color: #12100e;
        font-weight: 600;
        cursor: pointer;
      }
      #saved { color: #4ade80; font-size: 13px; margin-left: 10px; }
      .row { margin-top: 16px; }
      .accent-row { display: flex; align-items: center; gap: 10px; }
      input[type="color"] {
        width: 48px;
        height: 34px;
        padding: 2px;
        cursor: pointer;
      }
      .hint { font-size: 11.5px; color: #6f6657; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="url">URL do dashboard Midgard</label>
      <input id="url" type="url" placeholder="http://dockeralho.lan:8484" />
    </div>
    <div class="row">
      <label for="accent">Cor de destaque</label>
      <div class="accent-row">
        <input id="accent" type="color" value="#ff8c42" />
        <span id="accent-val">#ff8c42</span>
      </div>
      <div class="hint">O Brave não partilha o tema com extensões — escolhe aqui a tua cor.</div>
    </div>
    <div class="row">
      <button id="save">Guardar</button><span id="saved"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
